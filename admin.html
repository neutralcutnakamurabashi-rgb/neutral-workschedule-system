<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>シフト管理｜管理者画面</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      background: #f5f4f2;
      color: #333;
      min-height: 100vh;
    }
    header {
      background: #b5624a;
      color: #fff;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 18px; font-weight: 700; }
    header span { font-size: 12px; background: rgba(255,255,255,0.2); padding: 3px 10px; border-radius: 20px; }

    .container { max-width: 960px; margin: 0 auto; padding: 24px 16px 60px; }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .card h2 { font-size: 14px; font-weight: 700; color: #666; margin-bottom: 14px; }

    .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }

    select {
      padding: 10px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      background: #fff;
      color: #333;
    }
    select:focus { outline: none; border-color: #b5624a; }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-primary { background: #b5624a; color: #fff; }
    .btn-primary:hover { background: #9a4f3a; }
    .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
    .btn-secondary { background: #f0e0db; color: #b5624a; }
    .btn-secondary:hover { background: #e8d0c8; }
    .btn-green { background: #2e7d32; color: #fff; }
    .btn-green:hover { background: #1b5e20; }

    .staff-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
    }
    .staff-card {
      border: 1.5px solid #eee;
      border-radius: 8px;
      padding: 12px;
    }
    .staff-card .name { font-weight: 700; font-size: 14px; margin-bottom: 6px; }
    .staff-card .days { font-size: 12px; color: #888; line-height: 1.6; }
    .staff-card .count { font-size: 11px; color: #b5624a; font-weight: 700; margin-top: 4px; }

    .status-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 700;
    }
    .badge-ok { background: #e8f5e9; color: #2e7d32; }
    .badge-warn { background: #fff3e0; color: #e65100; }

    /* シフトテーブル */
    .shift-table-wrap { overflow-x: auto; }
    .shift-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      min-width: 500px;
    }
    .shift-table th {
      background: #b5624a;
      color: #fff;
      padding: 10px 8px;
      text-align: center;
      font-size: 12px;
    }
    .shift-table td {
      padding: 8px 6px;
      text-align: center;
      border-bottom: 1px solid #eee;
      font-size: 13px;
    }
    .shift-table tr:nth-child(even) td { background: #fdf8f7; }
    .shift-table .sun td:first-child, .shift-table .sun td:nth-child(2) { color: #c0392b; }
    .shift-table .sat td:first-child, .shift-table .sat td:nth-child(2) { color: #2980b9; }
    .shift-table .closed { color: #bbb; font-size: 11px; }
    .shift-table .check { color: #e65100; font-weight: 700; }

    .notes-box {
      margin-top: 16px;
      background: #fff9f7;
      border-left: 3px solid #b5624a;
      padding: 12px 16px;
      border-radius: 0 8px 8px 0;
      font-size: 13px;
      line-height: 1.8;
      white-space: pre-wrap;
    }

    .loading-box {
      padding: 24px;
      text-align: center;
      color: #aaa;
      font-size: 14px;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #333;
      color: #fff;
      padding: 12px 24px;
      border-radius: 24px;
      font-size: 14px;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.error { background: #c62828; }
    .toast.success { background: #2e7d32; }

    /* お客様向けカレンダープレビュー */
    .cal-preview {
      font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }
    .cal-preview-header {
      background: #b5624a;
      color: #fff;
      padding: 20px 24px;
      text-align: center;
    }
    .cal-preview-header h2 { font-size: 20px; letter-spacing: 0.1em; }
    .cal-preview-header p { font-size: 12px; margin-top: 4px; opacity: 0.8; }
    .cal-grid-wrap { padding: 16px; }
    .cal-dow {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      margin-bottom: 4px;
    }
    .cal-dow span {
      text-align: center;
      font-size: 11px;
      font-weight: 700;
      color: #999;
      padding: 4px 0;
    }
    .cal-dow span:first-child { color: #c0392b; }
    .cal-dow span:last-child { color: #2980b9; }
    .cal-cells {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
    }
    .cal-cell {
      border-radius: 6px;
      padding: 6px 4px;
      min-height: 70px;
      font-size: 11px;
      background: #fafafa;
      border: 1px solid #f0ebe9;
    }
    .cal-cell.empty { background: transparent; border: none; }
    .cal-cell.sun .cal-day-num { color: #c0392b; }
    .cal-cell.sat .cal-day-num { color: #2980b9; }
    .cal-day-num { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
    .cal-store { font-size: 10px; line-height: 1.5; color: #555; }
    .cal-store span { display: block; }
    .cal-store .store-label { color: #b5624a; font-weight: 700; }
    .cal-cell.all-closed { background: #f5f5f5; }
    .cal-cell.all-closed .cal-store { color: #ccc; }

    /* 店舗別カレンダー */
    .store-cals { display: flex; flex-direction: column; gap: 24px; }
    .store-cal-title {
      background: #b5624a;
      color: #fff;
      padding: 14px 20px;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.08em;
    }
    .staff-name { font-weight: 700; }
    .staff-iseki  { color: #b5624a; }
    .staff-yajima { color: #2980b9; }
    .staff-shimizu{ color: #27ae60; }
    .staff-miyagishi { color: #8e44ad; }
    .staff-maruyama { color: #e67e22; }
    .staff-inaba  { color: #c0392b; }
    .staff-legend {
      display: flex; gap: 12px; flex-wrap: wrap;
      padding: 10px 16px; background: #fdf8f7; font-size: 12px;
    }
    .staff-legend span { display: flex; align-items: center; gap: 4px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  </style>
</head>
<body>

<header>
  <h1>シフト管理</h1>
  <span>管理者専用</span>
</header>

<div class="container">

  <!-- Step 1 -->
  <div class="card">
    <h2>STEP 1｜対象月を選択</h2>
    <div class="row">
      <select id="yearMonth"></select>
      <button class="btn btn-primary" id="loadBtn">申請データを読み込む</button>
    </div>
  </div>

  <!-- Step 2 -->
  <div class="card" id="dataCard" style="display:none">
    <h2>STEP 2｜申請状況</h2>
    <div class="staff-grid" id="staffGrid"></div>
  </div>

  <!-- Step 3 -->
  <div class="card" id="generateCard" style="display:none">
    <h2>STEP 3｜AIでシフトを生成</h2>
    <div class="row" style="margin-bottom:14px">
      <button class="btn btn-primary" id="generateBtn">シフト案を生成する</button>
      <span style="font-size:12px;color:#999">※ Claude AIが叩き台を作成します（10〜20秒）</span>
    </div>
    <div id="resultArea" class="loading-box" style="display:none">AIがシフトを考えています...</div>
  </div>

  <!-- Step 4: シフト表 -->
  <div class="card" id="shiftCard" style="display:none">
    <h2>STEP 4｜シフト確認</h2>
    <div class="shift-table-wrap">
      <table class="shift-table" id="shiftTable"></table>
    </div>
    <div class="notes-box" id="notesBox" style="display:none"></div>
  </div>

  <!-- Step 5: お客様向けカレンダー -->
  <div class="card" id="calCard" style="display:none">
    <h2>STEP 5｜お客様向けカレンダー</h2>
    <div class="row" style="margin-bottom:16px">
      <button class="btn btn-green" id="exportBtn">HTMLとして保存</button>
    </div>
    <div id="calPreview"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbwanckQvkc2naErY_aF4Py9C3m_-eKRqawP1Q1TF6L1czmzEvwkAksjNO0RZXHkQMYZ/exec';

  const WEEKDAYS = ['日','月','火','水','木','金','土'];

  // 月セレクタ
  const sel = document.getElementById('yearMonth');
  const now = new Date();
  for (let i = 0; i < 6; i++) {
    let y = now.getFullYear(), m = now.getMonth() + 1 + i;
    if (m > 12) { m -= 12; y++; }
    const val = `${y}-${String(m).padStart(2,'0')}`;
    const opt = document.createElement('option');
    opt.value = val;
    opt.textContent = `${y}年${m}月`;
    sel.appendChild(opt);
  }

  let shiftData = null;

  // データ読み込み
  document.getElementById('loadBtn').addEventListener('click', async () => {
    const ym = sel.value;
    const btn = document.getElementById('loadBtn');
    btn.disabled = true; btn.textContent = '読み込み中...';

    try {
      const res = await fetch(`${GAS_URL}?action=getData&yearMonth=${ym}`);
      const json = await res.json();
      if (json.status !== 'ok') throw new Error(json.message);

      renderStaffGrid(json.data, ym);
      document.getElementById('dataCard').style.display = 'block';
      document.getElementById('generateCard').style.display = 'block';
      document.getElementById('shiftCard').style.display = 'none';
      document.getElementById('calCard').style.display = 'none';
      showToast('データを読み込みました', 'success');
    } catch(e) {
      showToast('読み込みに失敗: ' + e.message, 'error');
    } finally {
      btn.disabled = false; btn.textContent = '申請データを読み込む';
    }
  });

  function renderStaffGrid(data, ym) {
    const [y, m] = ym.split('-').map(Number);
    const daysInMonth = new Date(y, m, 0).getDate();
    const grid = document.getElementById('staffGrid');
    grid.innerHTML = '';
    ['伊関','矢島','清水','宮岸','丸山','稲葉'].forEach(name => {
      const entry = data.find(d => d.name === name);
      const card = document.createElement('div');
      card.className = 'staff-card';
      if (entry) {
        const days = String(entry.days).split(',').map(Number).sort((a,b)=>a-b);
        card.innerHTML = `<div class="name">${name} <span class="status-badge badge-ok">申請済</span></div>
          <div class="days">${days.join('日、')}日</div>
          <div class="count">計 ${days.length}日 / ${daysInMonth}日中</div>`;
      } else {
        card.innerHTML = `<div class="name">${name} <span class="status-badge badge-warn">未申請</span></div>
          <div class="days" style="color:#ccc">申請なし</div>`;
      }
      grid.appendChild(card);
    });
  }

  // シフト生成
  document.getElementById('generateBtn').addEventListener('click', async () => {
    const ym = sel.value;
    const btn = document.getElementById('generateBtn');
    const area = document.getElementById('resultArea');
    btn.disabled = true; btn.textContent = '生成中...';
    area.style.display = 'block';
    area.textContent = 'AIがシフトを考えています...（10〜20秒かかります）';

    try {
      const res = await fetch(`${GAS_URL}?action=generateShift&yearMonth=${ym}`);
      const json = await res.json();
      if (json.status !== 'ok') throw new Error(json.message);

      // JSONパース
      let rawText = json.shift.trim();
      if (rawText.startsWith('```')) rawText = rawText.replace(/```json?\n?/g,'').replace(/```/g,'').trim();
      const parsed = JSON.parse(rawText);
      shiftData = parsed;

      area.style.display = 'none';
      renderShiftTable(parsed, ym);
      renderCalendar(parsed, ym);
      document.getElementById('shiftCard').style.display = 'block';
      document.getElementById('calCard').style.display = 'block';
      showToast('シフト案が生成されました！', 'success');
    } catch(e) {
      area.textContent = 'エラー: ' + e.message;
      showToast('生成に失敗しました', 'error');
    } finally {
      btn.disabled = false; btn.textContent = 'シフト案を生成する';
    }
  });

  function renderShiftTable(data, ym) {
    const [y, m] = ym.split('-').map(Number);
    const table = document.getElementById('shiftTable');
    table.innerHTML = `<thead><tr>
      <th>日</th><th>曜</th>
      <th>桜台店</th><th>中村橋店</th>
      <th>富士見台<br>早晩</th><th>富士見台<br>遅晩</th>
    </tr></thead>`;
    const tbody = document.createElement('tbody');

    data.shifts.forEach(s => {
      const dow = new Date(y, m-1, s.day).getDay();
      const tr = document.createElement('tr');
      tr.className = dow===0 ? 'sun' : dow===6 ? 'sat' : '';
      tr.innerHTML = `
        <td>${s.day}</td>
        <td>${WEEKDAYS[dow]}</td>
        <td class="${s.sakuradai==='定休'?'closed':s.sakuradai==='要確認'?'check':''}">${s.sakuradai}</td>
        <td class="${s.nakamurohashi==='定休'?'closed':s.nakamurohashi==='要確認'?'check':''}">${s.nakamurohashi}</td>
        <td class="${s.fujimidai_early==='定休'?'closed':s.fujimidai_early==='要確認'?'check':''}">${s.fujimidai_early}</td>
        <td class="${s.fujimidai_late==='定休'?'closed':s.fujimidai_late==='要確認'?'check':''}">${s.fujimidai_late}</td>
      `;
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);

    if (data.notes) {
      const nb = document.getElementById('notesBox');
      nb.textContent = '📝 ' + data.notes;
      nb.style.display = 'block';
    }
  }

  // スタッフ名→CSSクラス
  const STAFF_CLASS = {
    '伊関': 'staff-iseki', '矢島': 'staff-yajima', '清水': 'staff-shimizu',
    '宮岸': 'staff-miyagishi', '丸山': 'staff-maruyama', '稲葉': 'staff-inaba'
  };
  const STAFF_COLOR = {
    '伊関': '#b5624a', '矢島': '#2980b9', '清水': '#27ae60',
    '宮岸': '#8e44ad', '丸山': '#e67e22', '稲葉': '#c0392b'
  };

  function staffSpan(name) {
    if (!name || name === '定休') return `<span style="color:#ccc;font-size:10px">定休</span>`;
    if (name === '要確認') return `<span style="color:#e65100;font-weight:700">要確認</span>`;
    const cls = STAFF_CLASS[name] || '';
    return `<span class="staff-name ${cls}">${name}</span>`;
  }

  function renderCalendar(data, ym) {
    const [y, m] = ym.split('-').map(Number);
    const firstDow = new Date(y, m-1, 1).getDay();
    const daysInMonth = new Date(y, m, 0).getDate();

    const preview = document.getElementById('calPreview');
    preview.innerHTML = '';

    const stores = [
      { key: 'sakuradai',     label: '桜台店',      fields: [{ field: 'sakuradai', label: '' }] },
      { key: 'nakamurohashi', label: '中村橋店',    fields: [{ field: 'nakamurohashi', label: '' }] },
      { key: 'fujimidai',     label: '富士見台店',  fields: [{ field: 'fujimidai_early', label: '早' }, { field: 'fujimidai_late', label: '遅' }] },
    ];

    const wrap = document.createElement('div');
    wrap.className = 'store-cals';

    // 凡例
    const legend = document.createElement('div');
    legend.className = 'staff-legend';
    Object.entries(STAFF_COLOR).forEach(([name, color]) => {
      legend.innerHTML += `<span><span class="legend-dot" style="background:${color}"></span>${name}</span>`;
    });

    stores.forEach(store => {
      const cal = document.createElement('div');
      cal.className = 'cal-preview';
      cal.innerHTML = `
        <div class="store-cal-title">${y}年${m}月　${store.label}　出勤カレンダー</div>
        <div class="cal-grid-wrap">
          <div class="cal-dow">
            <span>日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span>
          </div>
          <div class="cal-cells" id="cells_${store.key}"></div>
        </div>
      `;
      wrap.appendChild(cal);

      const cells = cal.querySelector(`#cells_${store.key}`);

      for (let i = 0; i < firstDow; i++) {
        const empty = document.createElement('div');
        empty.className = 'cal-cell empty';
        cells.appendChild(empty);
      }

      for (let d = 1; d <= daysInMonth; d++) {
        const dow = new Date(y, m-1, d).getDay();
        const shift = data.shifts.find(s => s.day === d);
        const cell = document.createElement('div');
        cell.className = `cal-cell ${dow===0?'sun':dow===6?'sat':''}`;

        let content = '';
        if (shift) {
          const isClosed = store.fields.every(f => shift[f.field] === '定休');
          if (isClosed) {
            cell.classList.add('all-closed');
            content = '<div class="cal-store"><span style="color:#ccc;font-size:10px">定休</span></div>';
          } else {
            content = '<div class="cal-store">';
            store.fields.forEach(f => {
              const val = shift[f.field];
              content += `<span>${f.label ? `<b style="color:#b5624a;font-size:9px">${f.label} </b>` : ''}${staffSpan(val)}</span>`;
            });
            content += '</div>';
          }
        }

        cell.innerHTML = `<div class="cal-day-num">${d}</div>${content}`;
        cells.appendChild(cell);
      }
    });

    wrap.appendChild(legend);
    preview.appendChild(wrap);
  }

  // HTMLとして保存
  document.getElementById('exportBtn').addEventListener('click', () => {
    if (!shiftData) return;
    const ym = sel.value;
    const [y, m] = ym.split('-').map(Number);

    const calEl = document.getElementById('calPreview').innerHTML;
    const html = `<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>${y}年${m}月 シフト</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Kaku Gothic ProN',sans-serif;background:#f5f4f2;padding:20px;}
.cal-preview{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.1);max-width:900px;margin:0 auto;}
.cal-preview-header{background:#b5624a;color:#fff;padding:20px 24px;text-align:center;}
.cal-preview-header h2{font-size:20px;letter-spacing:.1em;}
.cal-preview-header p{font-size:12px;margin-top:4px;opacity:.8;}
.cal-grid-wrap{padding:16px;}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px;}
.cal-dow span{text-align:center;font-size:11px;font-weight:700;color:#999;padding:4px 0;}
.cal-dow span:first-child{color:#c0392b;}
.cal-dow span:last-child{color:#2980b9;}
.cal-cells{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-cell{border-radius:6px;padding:6px 4px;min-height:70px;font-size:11px;background:#fafafa;border:1px solid #f0ebe9;}
.cal-cell.empty{background:transparent;border:none;}
.cal-cell.sun .cal-day-num{color:#c0392b;}
.cal-cell.sat .cal-day-num{color:#2980b9;}
.cal-day-num{font-size:13px;font-weight:700;margin-bottom:4px;}
.cal-store span{display:block;line-height:1.5;}
.store-label{color:#b5624a;font-weight:700;}
.cal-cell.all-closed{background:#f5f5f5;}
</style></head><body>${calEl}</body></html>`;

    const blob = new Blob([html], {type:'text/html'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `shift_${ym}.html`;
    a.click();
    showToast('HTMLを保存しました', 'success');
  });

  function showToast(msg, type='') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (type?' '+type:'');
    setTimeout(() => { t.className = 'toast'; }, 3000);
  }
</script>
</body>
</html>
