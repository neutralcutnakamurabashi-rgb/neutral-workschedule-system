<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>シフト申請</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      background: #f5f4f2;
      color: #333;
      min-height: 100vh;
    }

    header {
      background: #b5624a;
      color: #fff;
      padding: 16px 20px;
      text-align: center;
    }
    header h1 { font-size: 18px; font-weight: 700; letter-spacing: 0.05em; }
    header p { font-size: 12px; margin-top: 4px; opacity: 0.85; }

    .container { max-width: 480px; margin: 0 auto; padding: 20px 16px 40px; }

    .section { margin-bottom: 24px; }
    label { display: block; font-size: 13px; font-weight: 700; color: #666; margin-bottom: 8px; }

    select, .month-nav {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      background: #fff;
      font-size: 16px;
      color: #333;
      appearance: none;
      -webkit-appearance: none;
    }
    select:focus { outline: none; border-color: #b5624a; }

    .month-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      cursor: default;
    }
    .month-nav button {
      background: none;
      border: none;
      font-size: 20px;
      color: #b5624a;
      cursor: pointer;
      padding: 4px 10px;
      border-radius: 6px;
    }
    .month-nav button:active { background: #f0e0db; }
    .month-nav span { font-size: 16px; font-weight: 700; }

    .calendar {
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .cal-header {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      background: #b5624a;
      color: #fff;
    }
    .cal-header span {
      text-align: center;
      padding: 8px 0;
      font-size: 11px;
      font-weight: 700;
    }
    .cal-header span:first-child { color: #ffcbb8; }
    .cal-header span:last-child { color: #b8d4ff; }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1px;
      background: #eee;
    }
    .cal-day {
      background: #fff;
      text-align: center;
      padding: 10px 4px;
      font-size: 14px;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      transition: background 0.1s;
      min-height: 44px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .cal-day.empty { background: #fafafa; cursor: default; }
    .cal-day.sun { color: #c0392b; }
    .cal-day.sat { color: #2980b9; }
    .cal-day.selected {
      background: #b5624a;
      color: #fff !important;
      font-weight: 700;
      border-radius: 4px;
    }
    .cal-day.today { font-weight: 700; }
    .cal-day.today:not(.selected)::after {
      content: '';
      display: block;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #b5624a;
      margin-top: 2px;
    }
    .cal-day:active:not(.empty) { opacity: 0.7; }

    .selected-count {
      text-align: center;
      font-size: 13px;
      color: #888;
      margin-top: 10px;
    }
    .selected-count strong { color: #b5624a; }

    .btn-submit {
      display: block;
      width: 100%;
      padding: 16px;
      background: #b5624a;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.05em;
      margin-top: 24px;
      transition: background 0.15s;
    }
    .btn-submit:active { background: #9a4f3a; }
    .btn-submit:disabled { background: #ccc; cursor: not-allowed; }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #333;
      color: #fff;
      padding: 12px 24px;
      border-radius: 24px;
      font-size: 14px;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { background: #2e7d32; }
    .toast.error { background: #c62828; }
  </style>
</head>
<body>

<header>
  <h1>シフト申請</h1>
  <p>出勤できる日をすべて選んで送信してください</p>
</header>

<div class="container">

  <div class="section">
    <label>お名前</label>
    <select id="nameSelect">
      <option value="">-- 選択してください --</option>
    </select>
  </div>

  <div class="section">
    <label>対象月</label>
    <div class="month-nav">
      <button id="prevMonth">&#8249;</button>
      <span id="monthLabel"></span>
      <button id="nextMonth">&#8250;</button>
    </div>
  </div>

  <div class="section">
    <label>出勤可能日（タップで選択）</label>
    <div class="calendar">
      <div class="cal-header">
        <span>日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
    <p class="selected-count" id="selectedCount">0日 選択中</p>
  </div>

  <button class="btn-submit" id="submitBtn">申請する</button>
</div>

<div class="toast" id="toast"></div>

<script>
  // ===== 設定 =====
  const STAFF = ['伊関', '矢島', '清水', '宮岸', '丸山', '稲葉'];
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbwanckQvkc2naErY_aF4Py9C3m_-eKRqawP1Q1TF6L1czmzEvwkAksjNO0RZXHkQMYZ/exec'; // GASデプロイ後にURLを貼る

  // ===== 初期化 =====
  const nameSelect = document.getElementById('nameSelect');
  STAFF.forEach(name => {
    const opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    nameSelect.appendChild(opt);
  });

  let currentYear, currentMonth;
  let selectedDays = new Set();

  const today = new Date();
  currentYear = today.getFullYear();
  currentMonth = today.getMonth() + 2; // 翌月をデフォルト
  if (currentMonth > 12) { currentMonth = 1; currentYear++; }

  function renderCalendar() {
    selectedDays.clear();
    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';

    document.getElementById('monthLabel').textContent = `${currentYear}年 ${currentMonth}月`;

    const firstDay = new Date(currentYear, currentMonth - 1, 1).getDay();
    const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();

    for (let i = 0; i < firstDay; i++) {
      const blank = document.createElement('div');
      blank.className = 'cal-day empty';
      grid.appendChild(blank);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const cell = document.createElement('div');
      const dow = new Date(currentYear, currentMonth - 1, d).getDay();
      let cls = 'cal-day';
      if (dow === 0) cls += ' sun';
      if (dow === 6) cls += ' sat';
      if (d === today.getDate() && currentMonth === today.getMonth() + 1 && currentYear === today.getFullYear()) cls += ' today';
      cell.className = cls;
      cell.textContent = d;
      cell.dataset.day = d;
      cell.addEventListener('click', () => toggleDay(d, cell));
      grid.appendChild(cell);
    }
    updateCount();
  }

  function toggleDay(day, cell) {
    if (selectedDays.has(day)) {
      selectedDays.delete(day);
      cell.classList.remove('selected');
    } else {
      selectedDays.add(day);
      cell.classList.add('selected');
    }
    updateCount();
  }

  function updateCount() {
    const count = selectedDays.size;
    document.getElementById('selectedCount').innerHTML =
      `<strong>${count}日</strong> 選択中`;
  }

  document.getElementById('prevMonth').addEventListener('click', () => {
    currentMonth--;
    if (currentMonth < 1) { currentMonth = 12; currentYear--; }
    renderCalendar();
  });
  document.getElementById('nextMonth').addEventListener('click', () => {
    currentMonth++;
    if (currentMonth > 12) { currentMonth = 1; currentYear++; }
    renderCalendar();
  });

  renderCalendar();

  // ===== 送信 =====
  document.getElementById('submitBtn').addEventListener('click', async () => {
    const name = nameSelect.value;
    if (!name) { showToast('名前を選択してください', 'error'); return; }
    if (selectedDays.size === 0) { showToast('出勤可能日を選択してください', 'error'); return; }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '送信中...';

    const sortedDays = Array.from(selectedDays).sort((a, b) => a - b);
    const payload = {
      name,
      yearMonth: `${currentYear}-${String(currentMonth).padStart(2, '0')}`,
      days: sortedDays.join(',')
    };

    try {
      await fetch(GAS_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      showToast('申請が完了しました！', 'success');
      setTimeout(() => {
        nameSelect.value = '';
        renderCalendar();
      }, 1500);
    } catch (e) {
      showToast('送信に失敗しました。再度お試しください', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = '申請する';
    }
  });

  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (type ? ' ' + type : '');
    setTimeout(() => { t.className = 'toast'; }, 3000);
  }
</script>
</body>
</html>
